<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Hold_up</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../main.css">
        <link rel="icon" href="../icon.png" type="image/svg+xml">
    <body>
        <p><strong style="color: red;">THIS IS NOT ALLOWED TO CONTINUE WITHOUT BEING CONNECTED INTO AN ACCOUNT</strong></p>
        <form id="loginForm" action="#" novalidate style="max-width:320px; margin:0 auto; text-align:center;">
            <div style="margin-bottom:1rem;">
              <label for="username" style="display:block; margin-bottom:0.25rem; text-align:left;">Username :</label>
              <input type="text" id="username" name="username" required style="width:100%; max-width:280px; margin:0 auto; display:block;">
            </div>
            <div style="margin-bottom:1rem;">
              <label for="pwd" style="display:block; margin-bottom:0.25rem; text-align:left;">Password :</label>
              <input type="password" id="pwd" name="pwd" minlength="8" required style="width:100%; max-width:280px; margin:0 auto; display:block;">
            </div>
            <input type="submit" value="Connect" style="width:100%; max-width:280px; margin:0 auto; display:block;">
        </form>
        <div id="error" style="color:red;margin-top:8px" aria-live="polite"></div>

        <script src="login.js"></script>
    </body>
</html>
