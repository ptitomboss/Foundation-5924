<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>test</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../main.css">
        <link rel="icon" href="../icon.png" type="image/svg+xml">
    <body>
        <p>You need to log into an account to continue.</p>
        <form id="loginForm" method="post" action="/login" novalidate group="white">
            <label for="username">Nom d'utilisateur :</label>
            <input type="text" id="username" name="username" required><br><br>
            <label for="pwd">Mot de passe :</label>
            <input type="password" id="pwd" name="pwd" minlength="8" required><br><br>
            <input type="submit" value="Se connecter">
        </form>
        <div id="error" style="color:red;margin-top:8px" aria-live="polite"></div>
        <script>
        (function(){
            const err = document.getElementById('error');
            const params = new URLSearchParams(window.location.search);
            if (params.get('error')) {
                err.textContent = "Nom d'utilisateur ou mot de passe incorrect.";
            }
        })();
        </script>
    </body>
</html>
