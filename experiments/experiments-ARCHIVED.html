<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>test</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../main.css">
        <link rel="icon" href="../icon.png" type="image/svg+xml">
    <body>
        <p>You need to log into an account to continue.</p>
        <form id="loginForm" action="#" novalidate>
            <label for="username">Nom d'utilisateur :</label>
            <input type="text" id="username" name="username" required><br><br>
            <label for="pwd">Mot de passe :</label>
            <input type="password" id="pwd" name="pwd" minlength="8" required><br><br>
            <input type="submit" value="Se connecter">
        </form>
        <div id="error" style="color:red;margin-top:8px" aria-live="polite"></div>

        <script>
        (function(){
            const correctUsername = 'admin';
            const correctPassword = 'Secret123';

            const form = document.getElementById('loginForm');
            const err = document.getElementById('error');

            form.addEventListener('submit', function(e){
                e.preventDefault();
                err.textContent = '';
                const u = document.getElementById('username').value.trim();
                const p = document.getElementById('pwd').value;

                if (u === correctUsername && p === correctPassword) {
                    // Redirige vers la page suivante
                    window.location.href = 'ARCHIVED-experiments/test.html';
                } else {
                    err.textContent = "Nom d'utilisateur ou mot de passe incorrect.";
                }
            });
        })();
        </script>
    </body>
</html>
