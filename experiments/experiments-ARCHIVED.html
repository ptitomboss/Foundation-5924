<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Hold_up</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../main.css">
        <link rel="icon" href="../icon.png" type="image/svg+xml">
    <body>
        <p>You need to log into an account to continue.<strong style="color: red;">THIS IS NOT ALLOWED TO CONTINUE WITHOUT BEING CONNECTED INTO AN ACCOUNT</strong></p>
        <form id="loginForm" action="#" novalidate>
            <div style="text-align:center;">
              <label for="username">Name :</label>
              <input type="text" id="username" name="username" required style="float: center">
            </div><br>
            <div style="text-align:center;">
              <label for="pwd">Password :</label>
              <input type="password" id="pwd" name="pwd" minlength="8" required style="float: center">
            </div><br>
            <input type="submit" value="Connect" style="float: center">
        </form>
        <div id="error" style="color:red;margin-top:8px" aria-live="polite"></div>

        <script src="login.js"></script>
    </body>
</html>
